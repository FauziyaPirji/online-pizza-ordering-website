<html>
        <head>
                 <title>order Form</title>
                 <link rel="stylesheet" href="order_form.css">
        </head>
        <body>
                 <h2>Payment Method</h2>
                 <table>
                          <form>
                                   <tr>
                                         <td>
                                               <label>First Name :</lable>
                                         </td>
                                         <td>
                                               <input type="text" name="fname">
                                         </td>
                                   </tr>
                                   
                                   <tr>
                                         <td>
                                               <label>Middle Name :</lable>
                                         </td>
                                         <td>
                                               <input type="text" name="mname">
                                         </td>
                                   </tr>

                                   <tr>
                                         <td>
                                               <label>Last Name :</lable>
                                         </td>
                                         <td>
                                               <input type="text" name="lname">
                                         </td>
                                   </tr>

                                   <tr>
                                         <td>
                                               <label>Mobile Number :</lable>
                                         </td>
                                         <td>
                                               <input type="number" name="moname" min="0">
                                         </td>
                                   </tr><br><br>

                                    <tr>
                                         <td>
                                               <label>Address :</lable>
                                         </td>
                                         <td>
                                               <textarea></textarea>
                                         </td>
                                   </tr>

                                   <tr>
                                         <td>
                                               <label>City :</lable>
                                         </td>
                                         <td>
                                               <select>
                                                          <option value="Ahmedabad">Ahmedabad</option>
                                                          <option value="Vadodara">Vadodara</option>
                                                          <option value="Surat">Surat</option>
                                                          <option value="Rajkot">Rajkot</option>
                                                          <option value="Bhavnagar">Bhavnagar</option>
                                               </select>
                                               
                                         </td>
                                   </tr>

                                   <tr>
                                         <td>
                                               <label>Pincode :</lable>
                                         </td>
                                         <td>
                                               <input type="number" name="pin" min="0">
                                         </td>
                                   </tr>
                                   
                                    <tr>
                                           <td>
                                                <label>Quantity:</label>
                                           </td>
                                           <td>
                                                <input type="number" min"0">
                                           </td>
                                    </tr>
                                    <tr>
                                           <td>
                                                <label>Size</label>
                                           </td>
                                           <td>
                                                <input type="checkbox" value="small">Small
                                                <input type="checkbox" value="medium">Medium
                                                <input type="checkbox" value="large">Large
                                           </td>
                                    </tr>
                           </form>
                   </table>
                                    <br><br>
                                    <p><b>NOTE:-</b>Only Cash on delivery method accepted.</p>
                                    <br><br><br>
                                    <a href="confirm.html"><button type="button" id="buttongreen" value="Order">Order</button></a>
        </body>
</html>
